<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>顧客管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --border: #e5e7eb;
  --accent: #1d4ed8;
  --accent-light: #dbeafe;
  --text: #111827;
  --muted: #6b7280;
  --danger: #dc2626;
  --success: #16a34a;
  --warn: #d97706;
  --header: #1e293b;
  --sidebar-w: 240px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ===== MOBILE: 430px以下は従来通り ===== */
.app-wrapper {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* ===== PC LAYOUT ===== */
@media (min-width: 768px) {
  body { background: #e8eaf0; }

  .app-wrapper {
    max-width: 100%;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 60px 1fr;
    min-height: 100vh;
  }

  /* PC用グローバルヘッダー */
  .pc-header {
    grid-column: 1 / -1;
    grid-row: 1;
    background: var(--header);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    z-index: 200;
  }

  .pc-header h1 { color: #fff; font-size: 18px; font-weight: 700; }
  .pc-header .logo { font-size: 22px; }
  .pc-header .spacer { flex: 1; }
  .pc-header .pc-user { color: #94a3b8; font-size: 13px; }
  .pc-header .pc-logout {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff; font-size: 13px; font-weight: 700;
    padding: 6px 14px; cursor: pointer; font-family: inherit;
  }

  /* PC用サイドバー */
  .pc-sidebar {
    grid-column: 1;
    grid-row: 2;
    background: var(--header);
    padding: 16px 0;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .pc-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    color: #94a3b8;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 0;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }

  .pc-nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .pc-nav-item.active { background: rgba(29,78,216,0.2); color: #fff; border-left-color: var(--accent); }
  .pc-nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }

  /* PC用メインコンテンツエリア */
  .pc-main {
    grid-column: 2;
    grid-row: 2;
    overflow-y: auto;
    height: calc(100vh - 60px);
    padding: 24px;
  }

  /* PC時はスマホUI要素を非表示 */
  .mobile-topbar { display: none !important; }
  .mobile-only { display: none !important; }

  /* PC用パネル */
  .pc-panel {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .pc-panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .pc-panel-header h2 { font-size: 15px; font-weight: 700; flex: 1; }

  /* PC 2カラム詳細 */
  .pc-detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* PCの検索・フィルターバー */
  .pc-search-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
  }

  .pc-search-input-wrap {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pc-search-input {
    background: none; border: none; outline: none;
    font-size: 14px; font-family: inherit; color: var(--text); flex: 1;
  }

  .pc-filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }

  /* PC テーブル風リスト */
  .pc-table-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 80px;
    padding: 10px 20px;
    background: #f8f9fb;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .pc-table-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 80px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    align-items: center;
    transition: background 0.1s;
  }

  .pc-table-row:last-child { border-bottom: none; }
  .pc-table-row:hover { background: #f8f9fb; }

  .pc-table-name { font-size: 14px; font-weight: 700; }
  .pc-table-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .pc-table-cell { font-size: 13px; color: var(--text); }

  /* PC 詳細パネル */
  .pc-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .pc-info-row {
    display: flex;
    flex-direction: column;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .pc-info-row:nth-child(even) { border-right: none; }

  .pc-info-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .pc-info-value { font-size: 14px; color: var(--text); }

  /* PC 履歴 */
  .pc-int-card {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid var(--accent);
  }
  .pc-int-card:last-child { border-bottom: none; }
  .pc-int-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .pc-int-notes { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .pc-int-next { display: flex; gap: 6px; background: #fef9ec; border-radius: 8px; padding: 8px 10px; }

  /* PC 担当者管理 */
  .pc-staff-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
  }
  .pc-staff-row:last-child { border-bottom: none; }

  /* PC 対応履歴追加フォーム */
  .pc-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 20px;
  }

  .pc-form-full { grid-column: 1 / -1; }

  .fab { display: none !important; }
  .save-bar { position: static !important; border-top: none !important; padding: 0 20px 20px !important; background: none !important; }
}

/* ===== SHARED COMPONENTS ===== */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* TOPBAR (mobile) */
.mobile-topbar {
  background: var(--header);
  color: #fff;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.mobile-topbar h1 { font-size: 17px; font-weight: 700; flex: 1; }
.topbar-back {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* LOGIN */
#loginScreen {
  background: linear-gradient(160deg, #1e293b 0%, #0f172a 100%);
  align-items: center; justify-content: center; padding: 40px 24px;
  min-height: 100vh;
}
.login-logo {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 24px;
  box-shadow: 0 8px 24px rgba(29,78,216,0.4);
}
.login-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 360px;
}
.login-card h2 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-card p { color: #94a3b8; font-size: 13px; margin-bottom: 28px; }
.field-label { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.field-input {
  width: 100%; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
  padding: 12px 14px; color: #fff; font-size: 15px; font-family: inherit;
  margin-bottom: 16px; outline: none;
}
.field-input:focus { border-color: #3b82f6; }
.field-input::placeholder { color: #475569; }
.btn-primary {
  width: 100%; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  border: none; border-radius: 12px; color: #fff;
  font-size: 15px; font-weight: 700; padding: 14px;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 12px rgba(29,78,216,0.35);
}
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error { color: #f87171; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }

/* MOBILE LIST */
.search-bar { padding: 12px 16px; background: var(--header); }
.search-input-wrap { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
.search-input { background: none; border: none; outline: none; color: #fff; font-size: 14px; font-family: inherit; flex: 1; }
.search-input::placeholder { color: #94a3b8; }
.filter-row { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; background: #fff; border-bottom: 1px solid var(--border); }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--muted); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.count-bar { padding: 8px 16px; font-size: 12px; color: var(--muted); background: #fff; border-bottom: 1px solid var(--border); }
.list-content { flex: 1; overflow-y: auto; padding: 8px 0; }

.customer-card { background: #fff; margin: 0 12px 8px; border-radius: 12px; padding: 14px 16px; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.customer-card:active { opacity: 0.85; }
.customer-avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0; }
.customer-info { flex: 1; min-width: 0; }
.customer-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.customer-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.customer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

.badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.badge-新規 { background: #dbeafe; color: #1d4ed8; }
.badge-対応中 { background: #d1fae5; color: #065f46; }
.badge-再フォロー { background: #fef3c7; color: #92400e; }
.badge-完了 { background: #f3f4f6; color: #374151; }
.assigned-label { font-size: 11px; color: var(--muted); }

/* MOBILE DETAIL */
.detail-hero { background: var(--header); padding: 20px 16px 24px; color: #fff; }
.detail-name { font-size: 24px; font-weight: 700; margin-bottom: 2px; }
.detail-kana { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
.detail-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.detail-chip { background: rgba(255,255,255,0.12); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: #e2e8f0; }
.section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 16px 16px 8px; }
.info-card { background: #fff; margin: 0 12px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.info-row { display: flex; padding: 11px 16px; border-bottom: 1px solid var(--border); align-items: flex-start; gap: 8px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 12px; color: var(--muted); width: 100px; flex-shrink: 0; padding-top: 1px; }
.info-value { font-size: 14px; color: var(--text); flex: 1; word-break: break-all; }
.info-bool-yes { color: var(--danger); font-weight: 700; }
.info-bool-no { color: var(--muted); }
.collapse-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 16px 16px 8px; user-select: none; }
.collapse-toggle .ct-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; flex: 1; }
.collapse-toggle .ct-arrow { font-size: 14px; color: var(--muted); transition: transform 0.2s; }
.collapse-toggle.open .ct-arrow { transform: rotate(90deg); }
.collapsible { display: none; }
.collapsible.open { display: block; }

.interaction-card { background: #fff; margin: 0 12px 8px; border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); border-left: 3px solid var(--accent); }
.int-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.int-type { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; background: var(--accent-light); color: var(--accent); }
.int-date { font-size: 11px; color: var(--muted); }
.int-staff { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.int-notes { font-size: 14px; color: var(--text); margin-bottom: 8px; }
.int-next { display: flex; align-items: flex-start; gap: 6px; background: #fef9ec; border-radius: 8px; padding: 8px 10px; }
.int-next-label { font-size: 11px; font-weight: 700; color: var(--warn); flex-shrink: 0; }
.int-next-text { font-size: 13px; color: #78350f; }

/* ADD FORM */
.form-body { flex: 1; overflow-y: auto; padding: 12px 16px 100px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-control { width: 100%; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit; color: var(--text); outline: none; appearance: none; }
.form-control:focus { border-color: var(--accent); }
textarea.form-control { resize: none; min-height: 100px; }
.save-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #fff; border-top: 1px solid var(--border); padding: 16px; display: flex; gap: 10px; }
.btn-save { flex: 1; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; padding: 14px; cursor: pointer; font-family: inherit; }
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-cancel { background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--muted); font-size: 15px; font-weight: 700; padding: 14px 20px; cursor: pointer; font-family: inherit; }

.fab { position: fixed; bottom: 24px; right: max(20px, calc(50% - 430px/2 + 20px)); width: 56px; height: 56px; border-radius: 16px; background: var(--accent); border: none; color: #fff; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(29,78,216,0.4); }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--muted); font-size: 14px; gap: 8px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 700; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 1000; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 430px) and (max-width: 767px) { body { background: #e8eaf0; } .app-wrapper { box-shadow: 0 0 40px rgba(0,0,0,0.1); } }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOGIN (共通) -->
<div id="loginScreen" style="display:none;background:linear-gradient(160deg,#1e293b 0%,#0f172a 100%);align-items:center;justify-content:center;padding:40px 24px;min-height:100vh;flex-direction:column;">
  <div class="login-logo">📋</div>
  <div class="login-card">
    <h2>顧客管理システム</h2>
    <p>社内スタッフのみアクセス可能です</p>
    <div class="field-label">メールアドレス</div>
    <input class="field-input" type="email" id="loginEmail" placeholder="staff@example.com">
    <div class="field-label">パスワード</div>
    <input class="field-input" type="password" id="loginPw" placeholder="••••••••">
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- PC LAYOUT -->
<div id="pcLayout" style="display:none">
  <!-- PC ヘッダー -->
  <div class="pc-header">
    <span class="logo">📋</span>
    <h1>顧客管理システム</h1>
    <div class="spacer"></div>
    <span class="pc-user" id="pcUserLabel"></span>
    <button class="pc-logout" onclick="doLogout()">ログアウト</button>
  </div>
  <div style="display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:calc(100vh - 60px)">
    <!-- サイドバー -->
    <div class="pc-sidebar">
      <div class="pc-nav-item active" id="nav-list" onclick="pcShowPanel('list')">
        <span class="nav-icon">👥</span> 顧客一覧
      </div>
      <div class="pc-nav-item" id="nav-staff" onclick="pcShowPanel('staff')">
        <span class="nav-icon">⚙️</span> 担当者管理
      </div>
    </div>
    <!-- メインエリア -->
    <div class="pc-main" id="pcMain">
      <!-- JS で描画 -->
    </div>
  </div>
</div>

<!-- MOBILE LAYOUT -->
<div class="app-wrapper" id="mobileLayout" style="display:none">

  <!-- MOBILE LIST -->
  <div class="screen" id="listScreen">
    <div class="mobile-topbar">
      <h1>顧客一覧</h1>
      <button class="icon-btn" onclick="showScreen('staffScreen')" title="担当者管理">👥</button>
      <button class="icon-btn" onclick="doLogout()" title="ログアウト">⏻</button>
    </div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <span style="color:#94a3b8">🔍</span>
        <input class="search-input" type="text" id="searchInput" placeholder="氏名・フリガナ・LINE名で検索" oninput="onSearch()">
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-chip active" data-status="全て" onclick="setFilter(this)">全て</div>
      <div class="filter-chip" data-status="新規" onclick="setFilter(this)">新規</div>
      <div class="filter-chip" data-status="対応中" onclick="setFilter(this)">対応中</div>
      <div class="filter-chip" data-status="再フォロー" onclick="setFilter(this)">再フォロー</div>
      <div class="filter-chip" data-status="完了" onclick="setFilter(this)">完了</div>
    </div>
    <div class="count-bar" id="countBar">読み込み中...</div>
    <div class="list-content" id="customerList">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </div>

  <!-- MOBILE DETAIL -->
  <div class="screen" id="detailScreen">
    <div class="mobile-topbar">
      <button class="topbar-back" onclick="showScreen('listScreen')">‹</button>
      <h1 id="detailTitle">顧客詳細</h1>
    </div>
    <div style="flex:1;overflow-y:auto;padding-bottom:80px" id="detailContent"></div>
    <button class="fab" onclick="showAddScreen()">＋</button>
  </div>

  <!-- MOBILE STAFF -->
  <div class="screen" id="staffScreen">
    <div class="mobile-topbar">

function getAvatarColor(name) {

// ===== AUTH =====
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  if (!email || !pw) { err.textContent='メールアドレスとパスワードを入力してください'; return; }
  btn.disabled=true; btn.textContent='ログイン中...'; err.textContent='';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { err.textContent='メールアドレスまたはパスワードが違います'; btn.disabled=false; btn.textContent='ログイン'; return; }
  btn.disabled=false; btn.textContent='ログイン';
  enterApp(data.user);
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('pcLayout').style.display='none';
  document.getElementById('mobileLayout').style.display='none';
  showToast('ログアウトしました');
}

function enterApp(user) {
  document.getElementById('loginScreen').style.display='none';

    document.getElementById('pcLayout').style.display='none';

    loadCustomers();
  }
}

async function pcShowPanel(panel) {
  pcCurrentPanel = panel;
  document.querySelectorAll('.pc-nav-item').forEach(n=>n.classList.remove('active'));
  const navEl = document.getElementById('nav-'+panel);
  if (navEl) navEl.classList.add('active');
  const main = document.getElementById('pcMain');
  main.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  if (panel === 'list') await pcRenderList();
  if (panel === 'detail') await pcRenderDetail(currentCustomerId);
  if (panel === 'staff') await pcRenderStaff();
  if (panel === 'add') pcRenderAddForm();
}

// PC LIST
async function pcRenderList(q, filter) {
  q = q ?? document.getElementById('pcSearchInput')?.value?.trim() ?? '';
  filter = filter ?? currentFilter;
  const main = document.getElementById('pcMain');

  let query = sb.from('customers').select('id,customer_code,full_name,kana_name,line_name,prefecture,status,assigned_to,last_contact_at').order('last_contact_at',{ascending:false});
  if (filter !== '全て') query = query.eq('status', filter);
  if (q) query = query.or(`full_name.ilike.%${q}%,kana_name.ilike.%${q}%,line_name.ilike.%${q}%`);
  const { data, error } = await query;

  const chips = ['全て','新規','対応中','再フォロー','完了'].map(s=>`
    <div class="filter-chip ${filter===s?'active':''}" onclick="currentFilter='${s}';pcRenderList()">${s}</div>
  `).join('');

  if (error || !data) { main.innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p>読み込みエラー</p></div>`; return; }

  const rows = data.length === 0
    ? '<div class="empty-state" style="padding:40px"><div class="icon">🔍</div><p>該当する顧客が見つかりません</p></div>'
    : `<div class="pc-table-header"><div>顧客名</div><div>ステータス</div><div>都道府県</div><div>担当者</div><div>最終接触</div></div>`
      + data.map(c=>`
        <div class="pc-table-row" onclick="currentCustomerId='${c.id}';pcShowPanel('detail')">
          <div><div class="pc-table-name">${c.full_name||''}</div><div class="pc-table-sub">${c.kana_name||''}</div></div>
          <div><span class="badge badge-${c.status||''}">${c.status||''}</span></div>
          <div class="pc-table-cell">${c.prefecture||'-'}</div>
          <div class="pc-table-cell">${c.assigned_to||'-'}</div>
          <div class="pc-table-cell" style="font-size:12px">${c.last_contact_at||'-'}</div>
        </div>`).join('');

  main.innerHTML = `
    <div class="pc-search-bar">
      <div class="pc-search-input-wrap">
        <span style="color:var(--muted)">🔍</span>
        <input class="pc-search-input" id="pcSearchInput" type="text" placeholder="氏名・フリガナ・LINE名で検索" value="${q}" oninput="clearTimeout(searchTimer);searchTimer=setTimeout(()=>pcRenderList(),600)">
      </div>
    </div>
    <div class="pc-filter-chips" style="margin-bottom:16px">${chips}</div>
    <div class="pc-panel">
      <div class="pc-panel-header">
        <h2>顧客一覧</h2>
        <span style="font-size:13px;color:var(--muted)">${data.length}件</span>
      </div>
      ${rows}
    </div>`;
}

function showScreen(id) {
  document.querySelectorAll('#mobileLayout .screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function setFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.status;
  loadCustomers();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadCustomers, 600);
}

async function loadCustomers() {
  const q = document.getElementById('searchInput')?.value?.trim() ?? '';
  const listEl = document.getElementById('customerList');
  if (listEl) listEl.style.opacity = "0.5";

  let query = sb.from('customers').select('id,customer_code,full_name,kana_name,line_name,prefecture,status,assigned_to,last_contact_at').order('last_contact_at',{ascending:false});
  if (currentFilter !== '全て') query = query.eq('status', currentFilter);
  if (q) query = query.or(`full_name.ilike.%${q}%,kana_name.ilike.%${q}%,line_name.ilike.%${q}%`);
  const { data, error } = await query;

  const countEl = document.getElementById('countBar');
  if (error) { if(listEl) listEl.innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p>${error.message}</p></div>`; return; }
  if (countEl) countEl.textContent = `${data.length}件`; if (listEl) listEl.style.opacity = '1';
  if (!listEl) return;
  if (data.length === 0) { listEl.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>該当する顧客が見つかりません</p></div>'; return; }
  listEl.innerHTML = data.map(c=>`
    <div class="customer-card" onclick="showDetail('${c.id}')">
      <div class="customer-avatar" style="background:${getAvatarColor(c.full_name)}">${(c.full_name||'?').replace(/\s/g,'').charAt(0)}</div>
      <div class="customer-info">
        <div class="customer-name">${c.full_name||''}</div>
        <div class="customer-sub">${c.kana_name||''} · ${c.prefecture||''}</div>
      </div>
      <div class="customer-right">
        <span class="badge badge-${c.status||''}">${c.status||''}</span>
        <span class="assigned-label">${c.assigned_to||''}</span>
      </div>
    </div>`).join('');
}

  const [{ data: c, error: e1 }, { data: ints }, { data: cservices }] = await Promise.all([
    sb.from('customers').select('*').eq('id',id).single(),
    sb.from('interactions').select('*,services(name,category)').eq('customer_id',id).order('created_at',{ascending:false}),
    sb.from('customer_services').select('id,service_id,services(id,name,category)').eq('customer_id',id).order('created_at',{ascending:true})
  ]);
  if (e1) { document.getElementById('detailContent').innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p>${e1.message}</p></div>`; return; }
  document.getElementById('detailTitle').textContent = c.full_name||'顧客詳細';

  // 案件一覧HTML
  const serviceHtml = `
    <div style="background:#fff;margin:0 12px;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:0">
      ${(cservices&&cservices.length>0) ? cservices.map(cs=>`
        <div style="display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:10px">
          <span style="flex:1;font-size:14px;font-weight:700">${cs.services.name}</span>
          <span style="font-size:11px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:4px">${cs.services.category}</span>
          <button onclick="removeCustomerService('${cs.id}')" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>
        </div>`).join('')
      : '<div style="padding:14px 16px;color:var(--muted);font-size:13px">案件が登録されていません</div>'}
      <div style="padding:10px 16px;border-top:1px solid var(--border)">
        <button onclick="showAddServiceModal('${id}')" style="background:none;border:1.5px dashed var(--border);border-radius:8px;color:var(--accent);font-size:13px;font-weight:700;padding:8px 16px;cursor:pointer;width:100%;font-family:inherit">＋ 案件を追加</button>
      </div>
    </div>`;

  const intHtml = (ints&&ints.length>0) ? ints.map(i=>`
    <div class="interaction-card">
      <div class="int-header"><span class="int-type">${i.interaction_type||''}</span><span class="int-date">${formatDate(i.created_at)}</span></div>
      <div class="int-staff">担当：${i.staff_name||''}</div>
      ${i.services?`<div style="margin-bottom:6px"><span style="background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px">📋 ${i.services.name}</span></div>`:''}
      <div class="int-notes">${i.notes||''}</div>
      ${i.next_action?`<div class="int-next"><span class="int-next-label">次のアクション</span><span class="int-next-text">${i.next_action}</span></div>`:''}
    </div>`).join('')
    : '<div class="empty-state"><div class="icon">📝</div><p>対応履歴がありません</p></div>';

  const r = (label,val) => `<div class="info-row"><div class="info-label">${label}</div><div class="info-value">${val}</div></div>`;
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-hero">
      <div class="detail-name">${c.full_name||''}</div>
      <div class="detail-kana">${c.kana_name||''}</div>
      <div class="detail-chips">
        <span class="badge badge-${c.status||''}">${c.status||''}</span>
        ${c.prefecture?`<span class="detail-chip">📍 ${c.prefecture}</span>`:''}
        ${c.assigned_to?`<span class="detail-chip">👤 ${c.assigned_to}</span>`:''}
        ${c.last_contact_at?`<span class="detail-chip">📅 ${c.last_contact_at}</span>`:''}
      </div>
    </div>
    <div class="section-title">基本情報</div>
    <div class="info-card">
      ${r('顧客コード',c.customer_code)} ${r('LINE名',c.line_name||'-')}
      ${r('性別/年齢',`${c.gender||'-'} / ${c.age?c.age+'歳':'-'}`)} ${r('職種',c.occupation||'-')}
      ${r('勤務形態',c.employment_type||'-')} ${r('紹介者',c.referrer_name||'-')}
    </div>
    <div class="collapse-toggle" onclick="toggleCollapse(this)"><span class="ct-label">財務・詳細情報</span><span class="ct-arrow">›</span></div>
    <div class="collapsible">
      <div class="info-card" style="margin-bottom:0">
        ${r('興味関心',c.interests||'-')} ${r('希望内容',c.support_request||'-')}
        ${r('金融事故歴',c.financial_incident?'<span class="info-bool-yes">有</span>':'<span class="info-bool-no">なし</span>')}
        ${c.financial_incident?r('事故詳細',c.incident_detail||'-'):''}
        ${r('滞納状況',c.arrears_status||'-')} ${r('カード利用',c.card_status||'-')}
        ${r('口座凍結歴',c.frozen_account?'<span class="info-bool-yes">有</span>':'<span class="info-bool-no">なし</span>')}
        ${r('住居形態',c.housing_type||'-')} ${r('インフラ決済権',c.utilities_control||'-')}
        ${r('備考',c.notes||'-')}
      </div>
    </div>
    <div class="section-title" style="margin-top:8px">案件 (${cservices?cservices.length:0}件)</div>
    ${serviceHtml}
    <div class="section-title" style="margin-top:8px">対応履歴 (${ints?ints.length:0}件)</div>
    ${intHtml}
    <div style="height:20px"></div>`;
}

function toggleCollapse(el) { el.classList.toggle('open'); el.nextElementSibling.classList.toggle('open'); }

async function showAddScreen() {
  document.getElementById('fNotes').value='';
  document.getElementById('fNext').value='';
  await loadStaffOptions();
  await loadServiceOptions();
  showScreen('addScreen');
}

async function saveInteraction() {
  const staff = document.getElementById('fStaff').value;
  const type = document.getElementById('fType').value;
  const notes = document.getElementById('fNotes').value.trim();
  const next = document.getElementById('fNext').value.trim();
  const serviceId = document.getElementById('fService')?.value || null;
  if (!staff) { showToast('担当者を選択してください'); return; }
  if (!type) { showToast('対応種別を選択してください'); return; }
  if (!notes) { showToast('対応内容を入力してください'); return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='保存中...';
  const { error } = await sb.from('interactions').insert({
    customer_id: currentCustomerId, staff_name: staff,
    interaction_type: type.replace(/^.+\s/,''), notes,
    next_action: next||null,
    service_id: serviceId||null,
  });
  btn.disabled=false; btn.textContent='保存する';
  if (error) { showToast('保存失敗: '+error.message); return; }
  showToast('対応履歴を追加しました ✓');
  if (IS_PC()) { pcShowPanel('detail'); } else { showDetail(currentCustomerId); }
}

// ===== SERVICES =====
async function loadServiceOptions() {
  const sel = document.getElementById('fService');
  if (!sel) return;
  const { data } = await sb.from('customer_services')
    .select('service_id, services(id, name, category)')
    .eq('customer_id', currentCustomerId);
  sel.innerHTML = '<option value="">（案件を選択・任意）</option>';
  (data||[]).forEach(cs => {
    const o = document.createElement('option');
    o.value = cs.services.id;
    o.textContent = `${cs.services.name}（${cs.services.category}）`;
    sel.appendChild(o);
  });
}

async function showAddServiceModal(customerId) {
  const [{ data: all }, { data: existing }] = await Promise.all([
    sb.from('services').select('*').eq('active', true).order('category').order('name'),
    sb.from('customer_services').select('service_id').eq('customer_id', customerId)
  ]);
  const existingIds = (existing||[]).map(e => e.service_id);
  const available = (all||[]).filter(s => !existingIds.includes(s.id));

  if (available.length === 0) { showToast('追加できる案件がありません'); return; }

  // カテゴリでグループ化
  const grouped = {};
  available.forEach(s => {
    if (!grouped[s.category]) grouped[s.category] = [];
    grouped[s.category].push(s);
  });

  const checkboxHtml = Object.entries(grouped).map(([cat, items]) => `
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">${cat}</div>
      ${items.map(s=>`
        <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:6px;font-size:14px;font-weight:500">
          <input type="checkbox" value="${s.id}" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0">
          ${s.name}
        </label>`).join('')}
    </div>`).join('');

  const modal = document.createElement('div');
  modal.id = 'serviceModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:flex-end;justify-content:center';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">案件を追加</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">複数選択できます</div>
      <div style="flex:1;overflow-y:auto;margin-bottom:16px">${checkboxHtml}</div>
      <div style="display:flex;gap:10px;flex-shrink:0">
        <button onclick="document.getElementById('serviceModal').remove()" class="btn-cancel" style="flex:1">キャンセル</button>
        <button onclick="addCustomerServiceMulti('${customerId}')" class="btn-save" style="flex:2">追加する</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function addCustomerServiceMulti(customerId) {
  const checked = [...document.querySelectorAll('#serviceModal input[type=checkbox]:checked')];
  if (checked.length === 0) { showToast('案件を1つ以上選択してください'); return; }

  const records = checked.map(cb => ({ customer_id: customerId, service_id: cb.value }));
  const { error } = await sb.from('customer_services').insert(records);
  document.getElementById('serviceModal')?.remove();
  if (error) { showToast('追加失敗: '+error.message); return; }
  showToast(`${records.length}件の案件を追加しました ✓`);
  if (IS_PC()) { pcShowPanel('detail'); } else { showDetail(customerId); }
}

async function removeCustomerService(csId) {
  if (!confirm('この案件を削除しますか？')) return;
  const { error } = await sb.from('customer_services').delete().eq('id', csId);
  if (error) { showToast('削除失敗: '+error.message); return; }
  showToast('案件を削除しました');
  if (IS_PC()) { pcShowPanel('detail'); } else { showDetail(currentCustomerId); }
}

// ===== STAFF =====
async function loadStaffOptions() {
  const sel = document.getElementById('fStaff');
  if (!sel) return;
  const { data } = await sb.from('staff').select('name').eq('active',true).order('name');
  sel.innerHTML = '<option value="">選択してください</option>';
  (data||[]).forEach(s=>{ const o=document.createElement('option'); o.value=s.name; o.textContent=s.name; sel.appendChild(o); });
}

async function renderStaffList() {
  const el = document.getElementById('staffList');
  if (!el) return;
  el.innerHTML='<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  const { data } = await sb.from('staff').select('*').order('name');
  if (!data||data.length===0) { el.innerHTML='<p style="color:var(--muted);font-size:14px;padding:8px">担当者がいません</p>'; return; }
  el.innerHTML = data.map(s=>`
    <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
      <span style="flex:1;font-size:15px;font-weight:700;color:${s.active?'var(--text)':'var(--muted)'}">${s.name}${!s.active?' (無効)':''}</span>
      <button onclick="toggleStaff('${s.id}',${s.active})" style="background:${s.active?'#fef2f2':'#f0fdf4'};border:1px solid ${s.active?'#fecaca':'#bbf7d0'};border-radius:8px;color:${s.active?'var(--danger)':'var(--success)'};font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer;font-family:inherit">
        ${s.active?'無効化':'有効化'}
      </button>
    </div>`).join('');
}

async function addStaff() {
  const name = document.getElementById('newStaffName').value.trim();
  if (!name) { showToast('担当者名を入力してください'); return; }
  const { error } = await sb.from('staff').insert({ name, active: true });
  if (error) { showToast('追加失敗: '+error.message); return; }
  document.getElementById('newStaffName').value='';
  showToast(`${name} を追加しました ✓`);
  if (IS_PC()) { pcRenderStaff(); } else { renderStaffList(); }
}

async function toggleStaff(id, current) {
  const { error } = await sb.from('staff').update({ active: !current }).eq('id', id);
  if (error) { showToast('更新失敗: '+error.message); return; }
  showToast(current?'無効化しました':'有効化しました');
  if (IS_PC()) { pcRenderStaff(); } else { renderStaffList(); }
}

// staffScreenを表示するときは一覧も読み込む
const origShowScreen = showScreen;
window.showScreen = function(id) {
  origShowScreen(id);
  if (id === 'staffScreen') renderStaffList();
};

// ===== SESSION CHECK =====
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { enterApp(session.user); }
  else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('pcLayout').style.display='none';
    document.getElementById('mobileLayout').style.display='none';
  }
})();
</script>
</body>
</html>
