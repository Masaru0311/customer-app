<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>顧客管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --border: #e5e7eb;
  --accent: #1d4ed8;
  --accent-light: #dbeafe;
  --text: #111827;
  --muted: #6b7280;
  --danger: #dc2626;
  --success: #16a34a;
  --warn: #d97706;
  --header: #1e293b;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
}

.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* TOPBAR */
.topbar {
  background: var(--header);
  color: #fff;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.topbar h1 { font-size: 17px; font-weight: 700; flex: 1; }
.topbar-back {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: none; color: #fff; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: none; color: #fff; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* LOGIN */
#loginScreen {
  background: linear-gradient(160deg, #1e293b 0%, #0f172a 100%);
  align-items: center; justify-content: center; padding: 40px 24px;
}
.login-logo {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 24px;
  box-shadow: 0 8px 24px rgba(29,78,216,0.4);
}
.login-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 360px;
}
.login-card h2 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-card p { color: #94a3b8; font-size: 13px; margin-bottom: 28px; }
.field-label { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.field-input {
  width: 100%; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
  padding: 12px 14px; color: #fff; font-size: 15px; font-family: inherit;
  margin-bottom: 16px; outline: none;
}
.field-input:focus { border-color: #3b82f6; }
.field-input::placeholder { color: #475569; }
.btn-primary {
  width: 100%; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  border: none; border-radius: 12px; color: #fff;
  font-size: 15px; font-weight: 700; padding: 14px;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 12px rgba(29,78,216,0.35);
}
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error { color: #f87171; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }

/* LIST */
#listScreen { background: var(--bg); }
.search-bar { padding: 12px 16px; background: var(--header); }
.search-input-wrap {
  background: rgba(255,255,255,0.1); border-radius: 10px;
  padding: 10px 14px; display: flex; align-items: center; gap: 8px;
}
.search-input { background: none; border: none; outline: none; color: #fff; font-size: 14px; font-family: inherit; flex: 1; }
.search-input::placeholder { color: #94a3b8; }
.filter-row {
  display: flex; gap: 8px; padding: 10px 16px;
  overflow-x: auto; scrollbar-width: none;
  background: #fff; border-bottom: 1px solid var(--border);
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
  white-space: nowrap; cursor: pointer;
  border: 1.5px solid var(--border); background: #fff; color: var(--muted);
}
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.count-bar { padding: 8px 16px; font-size: 12px; color: var(--muted); background: #fff; border-bottom: 1px solid var(--border); }
.list-content { flex: 1; overflow-y: auto; padding: 8px 0; }

.customer-card {
  background: #fff; margin: 0 12px 8px; border-radius: 12px;
  padding: 14px 16px; cursor: pointer; border: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.customer-card:active { opacity: 0.85; }
.customer-avatar {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.customer-info { flex: 1; min-width: 0; }
.customer-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.customer-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.customer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

/* BADGES */
.badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.badge-新規 { background: #dbeafe; color: #1d4ed8; }
.badge-対応中 { background: #d1fae5; color: #065f46; }
.badge-再フォロー { background: #fef3c7; color: #92400e; }
.badge-完了 { background: #f3f4f6; color: #374151; }
.assigned-label { font-size: 11px; color: var(--muted); }

/* DETAIL */
#detailScreen { background: var(--bg); }
.detail-hero { background: var(--header); padding: 20px 16px 24px; color: #fff; }
.detail-name { font-size: 24px; font-weight: 700; margin-bottom: 2px; }
.detail-kana { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
.detail-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.detail-chip { background: rgba(255,255,255,0.12); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: #e2e8f0; }

.section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 16px 16px 8px; }
.info-card { background: #fff; margin: 0 12px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.info-row { display: flex; padding: 11px 16px; border-bottom: 1px solid var(--border); align-items: flex-start; gap: 8px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 12px; color: var(--muted); width: 100px; flex-shrink: 0; padding-top: 1px; }
.info-value { font-size: 14px; color: var(--text); flex: 1; word-break: break-all; }
.info-bool-yes { color: var(--danger); font-weight: 700; }
.info-bool-no { color: var(--muted); }

.collapse-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 16px 16px 8px; user-select: none; }
.collapse-toggle .ct-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; flex: 1; }
.collapse-toggle .ct-arrow { font-size: 14px; color: var(--muted); transition: transform 0.2s; }
.collapse-toggle.open .ct-arrow { transform: rotate(90deg); }
.collapsible { display: none; }
.collapsible.open { display: block; }

.interaction-card {
  background: #fff; margin: 0 12px 8px; border-radius: 12px;
  padding: 14px 16px; border: 1px solid var(--border); border-left: 3px solid var(--accent);
}
.int-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.int-type { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; background: var(--accent-light); color: var(--accent); }
.int-date { font-size: 11px; color: var(--muted); }
.int-staff { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.int-notes { font-size: 14px; color: var(--text); margin-bottom: 8px; }
.int-next { display: flex; align-items: flex-start; gap: 6px; background: #fef9ec; border-radius: 8px; padding: 8px 10px; }
.int-next-label { font-size: 11px; font-weight: 700; color: var(--warn); flex-shrink: 0; }
.int-next-text { font-size: 13px; color: #78350f; }

/* ADD */
#addScreen { background: var(--bg); }
.form-body { flex: 1; overflow-y: auto; padding: 12px 16px 100px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-control {
  width: 100%; background: #fff; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px; font-size: 15px;
  font-family: inherit; color: var(--text); outline: none; appearance: none;
}
.form-control:focus { border-color: var(--accent); }
textarea.form-control { resize: none; min-height: 100px; }
.save-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: #fff; border-top: 1px solid var(--border); padding: 16px; display: flex; gap: 10px;
}
.btn-save {
  flex: 1; background: var(--accent); border: none; border-radius: 12px;
  color: #fff; font-size: 16px; font-weight: 700; padding: 14px;
  cursor: pointer; font-family: inherit;
}
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-cancel {
  background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
  color: var(--muted); font-size: 15px; font-weight: 700; padding: 14px 20px;
  cursor: pointer; font-family: inherit;
}

/* FAB */
.fab {
  position: fixed; bottom: 24px;
  right: max(20px, calc(50% - 430px/2 + 20px));
  width: 56px; height: 56px; border-radius: 16px;
  background: var(--accent); border: none; color: #fff; font-size: 28px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(29,78,216,0.4);
}

/* EMPTY / LOADING */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--muted); font-size: 14px; gap: 8px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOAST */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1e293b; color: #fff; border-radius: 12px;
  padding: 12px 20px; font-size: 14px; font-weight: 700;
  opacity: 0; pointer-events: none; transition: all 0.3s;
  z-index: 1000; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 430px) { body { box-shadow: 0 0 40px rgba(0,0,0,0.1); } }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-logo">📋</div>
  <div class="login-card">
    <h2>顧客管理システム</h2>
    <p>社内スタッフのみアクセス可能です</p>
    <div class="field-label">メールアドレス</div>
    <input class="field-input" type="email" id="loginEmail" placeholder="staff@example.com">
    <div class="field-label">パスワード</div>
    <input class="field-input" type="password" id="loginPw" placeholder="••••••••">
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- LIST -->
<div class="screen" id="listScreen">
  <div class="topbar">
    <h1>顧客一覧</h1>
    <button class="icon-btn" onclick="doLogout()" title="ログアウト">⏻</button>
  </div>
  <div class="search-bar">
    <div class="search-input-wrap">
      <span style="color:#94a3b8">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="氏名・フリガナ・LINE名で検索" oninput="onSearch()">
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-chip active" data-status="全て" onclick="setFilter(this)">全て</div>
    <div class="filter-chip" data-status="新規" onclick="setFilter(this)">新規</div>
    <div class="filter-chip" data-status="対応中" onclick="setFilter(this)">対応中</div>
    <div class="filter-chip" data-status="再フォロー" onclick="setFilter(this)">再フォロー</div>
    <div class="filter-chip" data-status="完了" onclick="setFilter(this)">完了</div>
  </div>
  <div class="count-bar" id="countBar">読み込み中...</div>
  <div class="list-content" id="customerList">
    <div class="loading"><div class="spinner"></div>読み込み中...</div>
  </div>
</div>

<!-- DETAIL -->
<div class="screen" id="detailScreen">
  <div class="topbar">
    <button class="topbar-back" onclick="showScreen('listScreen')">‹</button>
    <h1 id="detailTitle">顧客詳細</h1>
  </div>
  <div style="flex:1;overflow-y:auto;padding-bottom:80px" id="detailContent"></div>
  <button class="fab" onclick="showAddScreen()">＋</button>
</div>

<!-- ADD -->
<div class="screen" id="addScreen">
  <div class="topbar">
    <button class="topbar-back" onclick="showScreen('detailScreen')">‹</button>
    <h1>対応履歴を追加</h1>
  </div>
  <div class="form-body">
    <div class="form-group">
      <label class="form-label">担当者<span class="required">*</span></label>
      <select class="form-control" id="fStaff">
        <option value="">選択してください</option>
        <option value="佐藤">佐藤</option>
        <option value="田中">田中</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">対応種別<span class="required">*</span></label>
      <select class="form-control" id="fType">
        <option value="">選択してください</option>
        <option value="電話">📞 電話</option>
        <option value="LINE">💬 LINE</option>
        <option value="対面">🤝 対面</option>
        <option value="その他">📝 その他</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">対応内容<span class="required">*</span></label>
      <textarea class="form-control" id="fNotes" placeholder="対応内容を詳しく記載してください"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">次のアクション</label>
      <input type="text" class="form-control" id="fNext" placeholder="例：来週月曜に電話フォロー">
    </div>
  </div>
  <div class="save-bar">
    <button class="btn-cancel" onclick="showScreen('detailScreen')">キャンセル</button>
    <button class="btn-save" id="saveBtn" onclick="saveInteraction()">保存する</button>
  </div>
</div>

<script>
// ===== SUPABASE INIT =====
const SUPABASE_URL = 'https://qqjnabaasmgxboejutaq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxam5hYmFhc21neGJvZWp1dGFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0ODczMDYsImV4cCI6MjA5NjA2MzMwNn0.AfkZ7UYv8B8azHi7ikmy0goSUrxIiEVhqF8q2W-hEsQ';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== STATE =====
let currentCustomerId = null;
let currentFilter = '全て';
let searchTimer = null;
const AVATAR_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899'];

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== AUTH =====
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');

  if (!email || !pw) { err.textContent = 'メールアドレスとパスワードを入力してください'; return; }

  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  err.textContent = '';

  const { error } = await sb.auth.signInWithPassword({ email, password: pw });

  if (error) {
    err.textContent = 'メールアドレスまたはパスワードが違います';
    btn.disabled = false;
    btn.textContent = 'ログイン';
    return;
  }

  btn.disabled = false;
  btn.textContent = 'ログイン';
  showScreen('listScreen');
  loadCustomers();
}

async function doLogout() {
  await sb.auth.signOut();
  showScreen('loginScreen');
  showToast('ログアウトしました');
}

// Enterキーでログイン
document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ===== LIST =====
function getAvatarColor(name) {
  let hash = 0;
  for (let i = 0; i < (name||'').length; i++) hash += name.charCodeAt(i);
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}

function setFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.status;
  loadCustomers();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadCustomers, 300);
}

async function loadCustomers() {
  const q = document.getElementById('searchInput').value.trim();
  const listEl = document.getElementById('customerList');
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

  let query = sb.from('customers').select('id,customer_code,full_name,kana_name,line_name,prefecture,status,assigned_to,last_contact_at').order('last_contact_at', { ascending: false });

  if (currentFilter !== '全て') {
    query = query.eq('status', currentFilter);
  }

  if (q) {
    query = query.or(`full_name.ilike.%${q}%,kana_name.ilike.%${q}%,line_name.ilike.%${q}%`);
  }

  const { data, error } = await query;

  if (error) {
    listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>読み込みエラー: ${error.message}</p></div>`;
    return;
  }

  document.getElementById('countBar').textContent = `${data.length}件`;

  if (data.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>該当する顧客が見つかりません</p></div>';
    return;
  }

  listEl.innerHTML = data.map(c => `
    <div class="customer-card" onclick="showDetail('${c.id}')">
      <div class="customer-avatar" style="background:${getAvatarColor(c.full_name)}">
        ${(c.full_name||'?').replace(/\s/g,'').charAt(0)}
      </div>
      <div class="customer-info">
        <div class="customer-name">${c.full_name||''}</div>
        <div class="customer-sub">${c.kana_name||''} · ${c.prefecture||''}</div>
      </div>
      <div class="customer-right">
        <span class="badge badge-${c.status||''}">${c.status||''}</span>
        <span class="assigned-label">${c.assigned_to||''}</span>
      </div>
    </div>
  `).join('');
}

// ===== DETAIL =====
async function showDetail(id) {
  currentCustomerId = id;
  document.getElementById('detailContent').innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  showScreen('detailScreen');

  const [{ data: c, error: e1 }, { data: ints, error: e2 }] = await Promise.all([
    sb.from('customers').select('*').eq('id', id).single(),
    sb.from('interactions').select('*').eq('customer_id', id).order('created_at', { ascending: false })
  ]);

  if (e1) { document.getElementById('detailContent').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e1.message}</p></div>`; return; }

  document.getElementById('detailTitle').textContent = c.full_name || '顧客詳細';

  const intHtml = (ints && ints.length > 0)
    ? ints.map(i => `
      <div class="interaction-card">
        <div class="int-header">
          <span class="int-type">${i.interaction_type||''}</span>
          <span class="int-date">${formatDate(i.created_at)}</span>
        </div>
        <div class="int-staff">担当：${i.staff_name||''}</div>
        <div class="int-notes">${i.notes||''}</div>
        ${i.next_action ? `<div class="int-next"><span class="int-next-label">次のアクション</span><span class="int-next-text">${i.next_action}</span></div>` : ''}
      </div>`).join('')
    : '<div class="empty-state"><div class="icon">📝</div><p>対応履歴がありません</p></div>';

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-hero">
      <div class="detail-name">${c.full_name||''}</div>
      <div class="detail-kana">${c.kana_name||''}</div>
      <div class="detail-chips">
        <span class="badge badge-${c.status||''}">${c.status||''}</span>
        ${c.prefecture ? `<span class="detail-chip">📍 ${c.prefecture}</span>` : ''}
        ${c.assigned_to ? `<span class="detail-chip">👤 ${c.assigned_to}</span>` : ''}
        ${c.last_contact_at ? `<span class="detail-chip">📅 ${c.last_contact_at}</span>` : ''}
      </div>
    </div>

    <div class="section-title">基本情報</div>
    <div class="info-card">
      ${row('顧客コード', c.customer_code)}
      ${row('LINE名', c.line_name||'-')}
      ${row('性別 / 年齢', `${c.gender||'-'} / ${c.age ? c.age+'歳' : '-'}`)}
      ${row('職種', c.occupation||'-')}
      ${row('勤務形態', c.employment_type||'-')}
      ${row('紹介者', c.referrer_name||'-')}
    </div>

    <div class="collapse-toggle" onclick="toggleCollapse(this)">
      <span class="ct-label">財務・詳細情報</span>
      <span class="ct-arrow">›</span>
    </div>
    <div class="collapsible">
      <div class="info-card" style="margin-bottom:0">
        ${row('興味関心', c.interests||'-')}
        ${row('希望内容', c.support_request||'-')}
        ${row('金融事故歴', c.financial_incident ? '<span class="info-bool-yes">有</span>' : '<span class="info-bool-no">なし</span>')}
        ${c.financial_incident ? row('事故詳細', c.incident_detail||'-') : ''}
        ${row('滞納状況', c.arrears_status||'-')}
        ${row('カード利用', c.card_status||'-')}
        ${row('口座凍結歴', c.frozen_account ? '<span class="info-bool-yes">有</span>' : '<span class="info-bool-no">なし</span>')}
        ${row('住居形態', c.housing_type||'-')}
        ${row('インフラ決済権', c.utilities_control||'-')}
        ${row('備考', c.notes||'-')}
      </div>
    </div>

    <div class="section-title" style="margin-top:8px">対応履歴 (${ints ? ints.length : 0}件)</div>
    ${intHtml}
    <div style="height:20px"></div>
  `;
}

function row(label, value) {
  return `<div class="info-row"><div class="info-label">${label}</div><div class="info-value">${value}</div></div>`;
}

function toggleCollapse(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function formatDate(str) {
  if (!str) return '';
  return str.replace('T', ' ').substring(0, 16);
}

// ===== ADD INTERACTION =====
function showAddScreen() {
  document.getElementById('fStaff').value = '';
  document.getElementById('fType').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('fNext').value = '';
  showScreen('addScreen');
}

async function saveInteraction() {
  const staff = document.getElementById('fStaff').value;
  const type = document.getElementById('fType').value;
  const notes = document.getElementById('fNotes').value.trim();
  const next = document.getElementById('fNext').value.trim();

  if (!staff) { showToast('担当者を選択してください'); return; }
  if (!type) { showToast('対応種別を選択してください'); return; }
  if (!notes) { showToast('対応内容を入力してください'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const { error } = await sb.from('interactions').insert({
    customer_id: currentCustomerId,
    staff_name: staff,
    interaction_type: type.replace(/^.+\s/, ''), // 絵文字除去
    notes,
    next_action: next || null,
  });

  btn.disabled = false;
  btn.textContent = '保存する';

  if (error) { showToast('保存失敗: ' + error.message); return; }

  showToast('対応履歴を追加しました ✓');
  showDetail(currentCustomerId);
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== SESSION CHECK =====
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showScreen('listScreen');
    loadCustomers();
  }
})();
</script>
